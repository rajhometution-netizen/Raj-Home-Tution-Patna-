<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raj Home Tuition Patna</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* TOP BAR */
.topbar {
    background:#0a2a52;
    color:white;
    padding:8px 20px;
    display:flex;
    justify-content:space-between;
    font-size:14px;
}

/* NAVBAR */
nav {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:white;
}

nav img {
    height:60px;
}

nav ul {
    display:flex;
    gap:20px;
    list-style:none;
}

nav ul li {
    cursor:pointer;
}

/* HERO */
.hero {
    display:flex;
    align-items:center;
    padding:50px;
    background:#f5f5f5;
}

.hero-text {
    width:50%;
}

.hero-text h1 {
    font-size:40px;
}

.hero-text span {
    color:#ff9900;
}

.hero img {
    width:50%;
    border-radius:10px;
}

/* BUTTONS */
.btn {
    padding:10px 20px;
    border:none;
    margin-right:10px;
    cursor:pointer;
    border-radius:5px;
}

.call {
    background:#0a2a52;
    color:white;
}

.whatsapp {
    background:#25D366;
    color:white;
}

/* SERVICES */
.services {
    text-align:center;
    padding:50px;
}

.cards {
    display:flex;
    gap:20px;
    justify-content:center;
}

.card {
    padding:20px;
    box-shadow:0 2px 10px #ccc;
    border-radius:10px;
}

/* FLOAT WHATSAPP */
.float {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    font-size:20px;
}
</style>
</head>

<body>

<div class="topbar">
    <div>📞 9117020347 | 📧 rajhometution01@gmail.com</div>
    <div>Follow us</div>
</div>

<nav>
    <img src="logo.png">
    <ul>
        <li>Home</li>
        <li>About</li>
        <li>Services</li>
        <li>Contact</li>
    </ul>
</nav>

<section class="hero">
    <div class="hero-text">
        <h1>Patna ka Sabse <span>Oldest</span> Home Tuition Provider</h1>
        <p>Nursery to 12th | All Subjects | Competitive Exams</p>

        <button class="btn call">📞 Call Now</button>
        <button class="btn whatsapp">WhatsApp</button>
    </div>

    <img src="https://images.unsplash.com/photo-1588072432836-e10032774350">
</section>

<section class="services">
    <h2>Our Services</h2>

    <div class="cards">
        <div class="card">Home Tuition</div>
        <div class="card">Online Classes</div>
        <div class="card">Exam Prep</div>
    </div>

<a href="#" class="float">
    <i class="fab fa-whatsapp"></i>
</a>
